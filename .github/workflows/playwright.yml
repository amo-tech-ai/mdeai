# D14 Playwright E2E — runs on every PR + push to main.
# Locked to chromium-only for speed (avg 35s on a 2-CPU runner).
name: e2e

on:
  push:
    branches: [main, fix/chat-production-hardening, ship/d12-server-side]
  pull_request:
    branches: [main]

jobs:
  playwright:
    name: Playwright (chromium)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright chromium
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        env:
          CI: "true"
          # PLAYWRIGHT_BASE_URL falls back to http://localhost:8080 — the
          # config's webServer block boots `npm run dev` automatically.
          # Override here when running against a Vercel preview URL.
          PLAYWRIGHT_QA_LANDLORD_PASSWORD: ${{ secrets.PLAYWRIGHT_QA_LANDLORD_PASSWORD || 'Qa-Landlord-V1-2026' }}
        run: npm run test:e2e

      - name: Upload HTML report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
