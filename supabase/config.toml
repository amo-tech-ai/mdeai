# Edge function JWT gateway (Supabase platform):
# `verify_jwt = false` means **no automatic JWT validation at the edge** — each handler must
# enforce auth (Bearer session), signed webhooks, or `apikey`+rate limits as documented in the function.
# Do not set `verify_jwt = true` here until that function's first-line auth has been verified.
# Public matrix (conceptual): webhook (Stripe, etc.) | anon+apikey (read-only AI) | user Bearer (mutations).

